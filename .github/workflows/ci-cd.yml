# CI/CD Pipeline für SF-1 Ultimate
# Test-/Build-Jobs unverändert übernommen; nur der Deploy-Job wurde ersetzt:
#   - Production-Deploy NUR bei Tag v*.*.*  (manuelles Freigabe-Gate via Environment)
#   - echtes Rebuild (build + up) statt 'docker-compose restart'
#   - Health-Check + Auto-Rollback über scripts/deploy.sh
#   - neue Secrets: DEPLOY_SSH_KEY / SERVER_HOST / SERVER_USER / SERVER_PATH
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, claude/**]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'

jobs:
  # ==========================================
  # FRONTEND: TypeScript + Lint + Build
  # ==========================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web-app/package-lock.json
      - name: Install Dependencies
        working-directory: apps/web-app
        run: npm ci --legacy-peer-deps
      - name: TypeScript Check
        working-directory: apps/web-app
        run: npx tsc --noEmit
      - name: Lint
        working-directory: apps/web-app
        run: npm run lint || echo "Lint warnings (non-blocking)"
      - name: Build
        working-directory: apps/web-app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""
          NEXT_TELEMETRY_DISABLED: 1

  # ==========================================
  # BACKEND: TypeScript Check + Build
  # ==========================================
  backend-ci:
    name: Backend CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - community-service
          - journal-service
          - price-service
          - tools-service
          - notification-service
          - search-service
          - media-service
          - gamification-service
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json
      - name: Install Dependencies
        working-directory: apps/${{ matrix.service }}
        run: npm ci --legacy-peer-deps
      - name: TypeScript Check
        working-directory: apps/${{ matrix.service }}
        run: npx tsc --noEmit || echo "TypeScript check done"
      - name: Build
        working-directory: apps/${{ matrix.service }}
        run: npm run build

  # ==========================================
  # AUTH SERVICE: Tests mit echtem PostgreSQL
  # ==========================================
  test-auth:
    name: Auth Service Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: sf1_user
          POSTGRES_DB: sf1_auth_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/auth-service/package-lock.json
      - name: Install Dependencies
        working-directory: apps/auth-service
        run: npm ci --legacy-peer-deps
      - name: Generate Prisma Client
        working-directory: apps/auth-service
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://sf1_user:test_password@localhost:5432/sf1_auth_test
      - name: Run Prisma Migrations
        working-directory: apps/auth-service
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://sf1_user:test_password@localhost:5432/sf1_auth_test
      - name: Run Tests
        working-directory: apps/auth-service
        run: npm test || echo "No tests defined"
        env:
          DATABASE_URL: postgresql://sf1_user:test_password@localhost:5432/sf1_auth_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_for_ci_only_minimum_32_chars_long
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_for_ci_minimum_32_chars

  # ==========================================
  # DEPLOY: NUR bei Tag v*.*.*  (manuelles Freigabe-Gate)
  #   echtes Rebuild + Health-Check + Auto-Rollback via scripts/deploy.sh
  # ==========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, test-auth]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://seedfinderpro.de
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: SSH-Key in Agent laden (taucht nicht im Log auf)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Server-Hostkey vertrauen
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy (getaggter Release)
        run: |
          ssh -o StrictHostKeyChecking=yes \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd '${{ secrets.SERVER_PATH }}' && git fetch --all --prune --tags && ./scripts/deploy.sh production '${{ github.ref_name }}'"
