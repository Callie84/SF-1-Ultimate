version: '3.8'

networks:
  sf1-network:
    driver: bridge

volumes:
  mongodb_data:
    name: sf1-mongodb-data-v1
    driver: local
  postgres_data:
    # 2026-06-02: zurückgesetzt auf altes Default-Volume — am 19.05. wurde versehentlich
    # auf ein frisches Volume (sf1-postgres-data-v1) umgestellt, wodurch 77 User inkl.
    # Admin-Account "verloren" gingen. Daten lagen unangetastet im alten Volume.
    name: sf-1-ultimate-_postgres_data
    driver: local
  redis_data:
    name: sf1-redis-data-v1
    driver: local
  meilisearch_data:
    name: sf1-meilisearch-data-v1
    driver: local
  traefik_certs:
    name: sf1-traefik-certs-v1
    driver: local
  prometheus_data:
    name: sf1-prometheus-data-v1
    driver: local
  grafana_data:
    name: sf1-grafana-data-v1
    driver: local
  alertmanager_data:
    name: sf1-alertmanager-data-v1
    driver: local
  loki_data:
    name: sf1-loki-data-v1
    driver: local
  plausible_pg_data:
    name: sf1-plausible-pg-data-v1
    driver: local
  plausible_ch_data:
    name: sf1-plausible-ch-data-v1
    driver: local
  unleash_pg_data:
    name: sf1-unleash-pg-data-v1
    driver: local

services:
  # Datenbanken
  mongodb:
    image: mongo:7
    container_name: sf1-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: sf1_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - sf1-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: sf1-postgres
    restart: always
    environment:
      POSTGRES_USER: sf1_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sf1_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sf1-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sf1_user -d sf1_db && psql -U sf1_user -d sf1_db -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: sf1-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sf1-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: sf1-meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - sf1-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # API Gateway
  api-gateway:
    image: traefik:v2.10
    container_name: sf1-api-gateway
    restart: always
    command:
      - "--api=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=sf-1-ultimate-_sf1-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=klingenpascal@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--ping=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      # Dashboard-Router: nur HTTPS, nur über traefik.seedfinderpro.de
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.seedfinderpro.de`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth,traefik-compress"
      # BasicAuth Middleware (Passwort in .env: TRAEFIK_DASHBOARD_USERS)
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"
      - "traefik.http.middlewares.traefik-auth.basicauth.removeheader=true"
      # Gzip-Kompression für Dashboard-Assets
      - "traefik.http.middlewares.traefik-compress.compress=true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Frontend
  frontend:
    image: node:20-alpine
    container_name: sf1-frontend
    restart: always
    working_dir: /app
    command: sh -c "npm install --include=dev && npm run build && npm run start"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    volumes:
      - ./apps/web-app:/app
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ""
      NEXT_TELEMETRY_DISABLED: 1
      NODE_OPTIONS: "--max-old-space-size=2048"
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN_FRONTEND}
      # Feature Flags — Unleash (Session 79)
      UNLEASH_URL: http://sf1-unleash:4242
      UNLEASH_FRONTEND_API_KEY: ${UNLEASH_FRONTEND_API_KEY}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      # Production HTTPS route
      - "traefik.http.routers.frontend.rule=Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      # Local HTTP route (for development)
      - "traefik.http.routers.frontend-local.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend-local.priority=1"
      - "traefik.http.routers.frontend-local.entrypoints=web"
      # Service
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # WWW redirect to non-www
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.seedfinderpro\\.de/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://seedfinderpro.de/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      # Security Headers
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"
      - "traefik.http.middlewares.security-headers.headers.contentSecurityPolicy=default-src 'self'; img-src 'self' data: blob: https://fsn1.your-objectstorage.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://seedfinderpro.de https://api.seedfinderpro.de; font-src 'self' data:; frame-ancestors 'none';"
      - "traefik.http.routers.frontend.middlewares=security-headers"
      # SEC-8: Traefik Gateway-Level Rate Limiting (zweite Schutzschicht)
      # Auth-Routen: 20 req/min (Login, Register, Password-Reset)
      - "traefik.http.middlewares.rl-auth.rateLimit.average=20"
      - "traefik.http.middlewares.rl-auth.rateLimit.period=1m"
      - "traefik.http.middlewares.rl-auth.rateLimit.burst=5"
      # Standard API: 300 req/min pro IP
      - "traefik.http.middlewares.rl-api.rateLimit.average=300"
      - "traefik.http.middlewares.rl-api.rateLimit.period=1m"
      - "traefik.http.middlewares.rl-api.rateLimit.burst=60"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Backend Services
  auth-service:
    image: node:20-slim
    container_name: sf1-auth-service
    restart: always
    security_opt:
      - no-new-privileges:true
    # read_only excluded: service installs packages at runtime (apt-get); requires Dockerfile TS-fix first (SEC-10 pending)
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y openssl ca-certificates && npm install && npx prisma generate && npx prisma db push && npm install -g tsx && npx tsx src/index.ts"
    volumes:
      - ./apps/auth-service:/app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sf1_user:${POSTGRES_PASSWORD}@postgres:5432/sf1_db
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_auth?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN_BACKEND}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      FRONTEND_URL: https://seedfinderpro.de
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      # Production HTTPS route - NO strip prefix (service handles /api/auth prefix)
      - "traefik.http.routers.auth.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.auth.priority=10"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls=true"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.auth.middlewares=rl-auth"
      # Local HTTP route (for development)
      - "traefik.http.routers.auth-local.rule=Host(`localhost`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.auth-local.priority=10"
      - "traefik.http.routers.auth-local.entrypoints=web"
      - "traefik.http.routers.auth-local.middlewares=rl-auth"
      # Service
      - "traefik.http.services.auth.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  journal-service:
    image: node:20-alpine
    container_name: sf1-journal-service
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    working_dir: /app
    command: sh -c "npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - ./apps/journal-service:/app
    environment:
      NODE_ENV: production
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_journal?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN_BACKEND}
      CORS_ORIGIN: ${CORS_ORIGIN}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      SEARCH_SERVICE_URL: http://sf1-search-service:3007
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      # Production HTTPS route
      - "traefik.http.routers.journal.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && (PathPrefix(`/api/journal`) || PathPrefix(`/api/grows`) || PathPrefix(`/api/plants`))"
      - "traefik.http.routers.journal.priority=10"
      - "traefik.http.routers.journal.entrypoints=websecure"
      - "traefik.http.routers.journal.tls=true"
      - "traefik.http.routers.journal.tls.certresolver=letsencrypt"
      - "traefik.http.routers.journal.middlewares=rl-api"
      # service expects full path /api/journal/...
      # Local HTTP route - NO strip prefix
      - "traefik.http.routers.journal-local.rule=Host(`localhost`) && (PathPrefix(`/api/journal`) || PathPrefix(`/api/grows`) || PathPrefix(`/api/plants`))"
      - "traefik.http.routers.journal-local.priority=10"
      - "traefik.http.routers.journal-local.entrypoints=web"
      # Shared middleware and service
      - "traefik.http.middlewares.journal-stripprefix.stripprefix.prefixes=/api/journal,/api/grows,/api/plants"
      - "traefik.http.services.journal.loadbalancer.server.port=3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  search-service:
    image: node:20-alpine
    container_name: sf1-search-service
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    working_dir: /app
    command: sh -c "npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - ./apps/search-service:/app
    environment:
      NODE_ENV: production
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_search?authSource=admin&directConnection=true
      MONGODB_URL_PRICES: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_price?authSource=admin&directConnection=true
      MONGODB_URL_COMMUNITY: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_community?authSource=admin&directConnection=true
      MONGODB_URL_JOURNAL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_journal?authSource=admin&directConnection=true
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_MASTER_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN_BACKEND}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      DATABASE_URL: postgresql://sf1_user:${POSTGRES_PASSWORD}@postgres:5432/sf1_db
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.search.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && PathPrefix(`/api/search`)"
      - "traefik.http.routers.search.priority=10"
      - "traefik.http.routers.search.entrypoints=websecure"
      - "traefik.http.routers.search.tls=true"
      - "traefik.http.routers.search.tls.certresolver=letsencrypt"
      - "traefik.http.routers.search.middlewares=rl-api"
      # service expects full path /api/search/...
      - "traefik.http.services.search.loadbalancer.server.port=3007"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  gamification-service:
    image: node:20-alpine
    container_name: sf1-gamification-service
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    working_dir: /app
    command: sh -c "npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - ./apps/gamification-service:/app
    environment:
      NODE_ENV: production
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_gamification?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN_BACKEND}
      CORS_ORIGIN: ${CORS_ORIGIN}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gamification.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && (PathPrefix(`/api/gamification`) || PathPrefix(`/api/achievements`) || PathPrefix(`/api/leaderboard`))"
      - "traefik.http.routers.gamification.priority=10"
      - "traefik.http.routers.gamification.entrypoints=websecure"
      - "traefik.http.routers.gamification.tls=true"
      - "traefik.http.routers.gamification.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gamification.middlewares=rl-api"
      # service expects full path /api/gamification/...
      - "traefik.http.services.gamification.loadbalancer.server.port=3009"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  price-service:
    image: node:20-alpine
    container_name: sf1-price-service
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    working_dir: /app
    command: sh -c "npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - ./apps/price-service:/app
      - /root/SF-Brain/strain_output:/strain-data:ro
    environment:
      NODE_ENV: production
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_price?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN_BACKEND}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
    env_file:
      - .env.feeds
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.price.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && (PathPrefix(`/api/prices`) || PathPrefix(`/api/strains`) || PathPrefix(`/api/alerts`))"
      - "traefik.http.routers.price.priority=10"
      - "traefik.http.routers.price.entrypoints=websecure"
      - "traefik.http.routers.price.tls=true"
      - "traefik.http.routers.price.tls.certresolver=letsencrypt"
      - "traefik.http.routers.price.middlewares=rl-api"
      # service expects full path /api/prices/...
      - "traefik.http.services.price.loadbalancer.server.port=3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  media-service:
    image: node:20-alpine
    container_name: sf1-media-service
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=500m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    working_dir: /app
    command: sh -c "npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - ./apps/media-service:/app
    environment:
      NODE_ENV: production
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_media?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.media.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && (PathPrefix(`/api/media`) || PathPrefix(`/api/upload`))"
      - "traefik.http.routers.media.priority=10"
      - "traefik.http.routers.media.entrypoints=websecure"
      - "traefik.http.routers.media.tls=true"
      - "traefik.http.routers.media.tls.certresolver=letsencrypt"
      - "traefik.http.routers.media.middlewares=rl-api"
      # service expects full path /api/media/...
      - "traefik.http.services.media.loadbalancer.server.port=3008"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  tools-service:
    image: node:20-alpine
    container_name: sf1-tools-service
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    working_dir: /app
    command: sh -c "npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - ./apps/tools-service:/app
    environment:
      NODE_ENV: production
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_tools?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SENTRY_WEBHOOK_SECRET: ${SENTRY_WEBHOOK_SECRET}
      SENTRY_FIX_EMAIL: ${SENTRY_FIX_EMAIL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tools.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && (PathPrefix(`/api/tools`) || PathPrefix(`/api/calculator`))"
      - "traefik.http.routers.tools.priority=10"
      - "traefik.http.routers.tools.entrypoints=websecure"
      - "traefik.http.routers.tools.tls=true"
      - "traefik.http.routers.tools.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tools.middlewares=rl-api"
      # service expects full path /api/tools/...
      - "traefik.http.services.tools.loadbalancer.server.port=3004"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  notification-service:
    image: node:20-alpine
    container_name: sf1-notification-service
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    working_dir: /app
    command: sh -c "npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - ./apps/notification-service:/app
    environment:
      NODE_ENV: production
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_notification?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN_BACKEND}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-SeedFinderPro <noreply@seedfinderpro.de>}
      AUTH_SERVICE_URL: http://sf1-auth-service:3001
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:noreply@seedfinderpro.de}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notification.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && (PathPrefix(`/api/notifications`) || PathPrefix(`/api/preferences`))"
      - "traefik.http.routers.notification.priority=10"
      - "traefik.http.routers.notification.entrypoints=websecure"
      - "traefik.http.routers.notification.tls=true"
      - "traefik.http.routers.notification.tls.certresolver=letsencrypt"
      - "traefik.http.routers.notification.middlewares=rl-api"
      # service expects full path /api/notifications/...
      - "traefik.http.services.notification.loadbalancer.server.port=3006"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  community-service:
    image: node:20-alpine
    container_name: sf1-community-service
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    working_dir: /app
    command: sh -c "npm install --include=dev --legacy-peer-deps && ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - ./apps/community-service:/app
    environment:
      NODE_ENV: production
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_community?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN_BACKEND}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      # Production HTTPS route
      - "traefik.http.routers.community.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && (PathPrefix(`/api/community`) || PathPrefix(`/api/posts`) || PathPrefix(`/api/comments`))"
      - "traefik.http.routers.community.priority=10"
      - "traefik.http.routers.community.entrypoints=websecure"
      - "traefik.http.routers.community.tls=true"
      - "traefik.http.routers.community.tls.certresolver=letsencrypt"
      - "traefik.http.routers.community.middlewares=rl-api"
      # Local HTTP route - NO strip prefix
      - "traefik.http.routers.community-local.rule=Host(`localhost`) && (PathPrefix(`/api/community`) || PathPrefix(`/api/posts`) || PathPrefix(`/api/comments`))"
      - "traefik.http.routers.community-local.priority=10"
      - "traefik.http.routers.community-local.entrypoints=web"
      - "traefik.http.routers.community-local.middlewares=rl-api"
      # Shared middleware and service
      - "traefik.http.middlewares.community-stripprefix.stripprefix.prefixes=/api/community,/api/posts,/api/comments"
      - "traefik.http.services.community.loadbalancer.server.port=3005"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ==========================================
  # MONITORING STACK
  # ==========================================

  # Metriken-Sammlung
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sf1-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.seedfinderpro.de`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      # Prometheus hinter BasicAuth (gleiche Credentials wie Traefik-Dashboard)
      - "traefik.http.routers.prometheus.middlewares=traefik-auth"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Alert-Routing → Telegram
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sf1-alertmanager
    restart: always
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.listen-address='
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - sf1-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Dashboards
  grafana:
    image: grafana/grafana:10.2.0
    container_name: sf1-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: https://grafana.seedfinderpro.de
      GF_ALERTING_ENABLED: 'false'
      GF_UNIFIED_ALERTING_ENABLED: 'false'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - sf1-network
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.seedfinderpro.de`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      # Grafana hat eigene Auth → kein BasicAuth-Middleware
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ==========================================
  # BACKUP SERVICE
  # ==========================================

  backup-service:
    build: ./apps/backup-service
    container_name: sf1-backup
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=500m,noexec,nosuid
      - /root:size=200m,noexec,nosuid
    environment:
      - PORT=3011
      - JWT_SECRET=${JWT_SECRET}
      - SENTRY_DSN=${SENTRY_DSN_BACKEND}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_DIR=/backups
      - BACKUP_SCHEDULE=0 2 * * *
      - BACKUP_RETENTION=7
      - BACKUP_HOST=${BACKUP_HOST:-}
      - BACKUP_USER=${BACKUP_USER:-}
      - BACKUP_PASS=${BACKUP_PASS:-}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
    volumes:
      - ./backups:/backups
      - ./apps/backup-service/src:/app/src
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backup.rule=(Host(`seedfinderpro.de`) || Host(`www.seedfinderpro.de`)) && PathPrefix(`/api/backup`)"
      - "traefik.http.routers.backup.priority=10"
      - "traefik.http.routers.backup.entrypoints=websecure"
      - "traefik.http.routers.backup.tls=true"
      - "traefik.http.routers.backup.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backup.middlewares=rl-api"
      - "traefik.http.services.backup.loadbalancer.server.port=3011"
    networks:
      - sf1-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3011/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ==========================================
  # LOG-AGGREGATION
  # ==========================================

  # Loki: Log-Datenbank
  loki:
    image: grafana/loki:2.9.4
    container_name: sf1-loki
    restart: always
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - sf1-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Promtail: Log-Collector (liest Docker-Container-Logs)
  promtail:
    image: grafana/promtail:2.9.4
    container_name: sf1-promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - sf1-network
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Plausible Analytics (Session 77) ──────────────────────────────────────
  plausible-db:
    image: postgres:15-alpine
    container_name: sf1-plausible-db
    restart: always
    environment:
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD}
      POSTGRES_DB: plausible_db
    volumes:
      - plausible_pg_data:/var/lib/postgresql/data
    networks:
      - sf1-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible -d plausible_db && psql -U plausible -d plausible_db -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  plausible-clickhouse:
    image: clickhouse/clickhouse-server:23.3-alpine
    container_name: sf1-plausible-clickhouse
    restart: always
    volumes:
      - plausible_ch_data:/var/lib/clickhouse
    networks:
      - sf1-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 500m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  plausible:
    image: plausible/analytics:v2
    container_name: sf1-plausible
    restart: always
    command: sh -c "sleep 15 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    environment:
      BASE_URL: https://analytics.seedfinderpro.de
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      DATABASE_URL: postgresql://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible-db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible-clickhouse:8123/plausible_events_db
      DISABLE_REGISTRATION: "invite_only"
    deploy:
      resources:
        limits:
          memory: 400m
    depends_on:
      plausible-db:
        condition: service_healthy
      plausible-clickhouse:
        condition: service_started
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plausible.rule=Host(`analytics.seedfinderpro.de`)"
      - "traefik.http.routers.plausible.entrypoints=websecure"
      - "traefik.http.routers.plausible.tls=true"
      - "traefik.http.routers.plausible.tls.certresolver=letsencrypt"
      - "traefik.http.services.plausible.loadbalancer.server.port=8000"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Feature Flags — Unleash (Session 79) ───────────────────────────────────
  unleash-db:
    image: postgres:15-alpine
    container_name: sf1-unleash-db
    restart: always
    environment:
      POSTGRES_USER: unleash_user
      POSTGRES_PASSWORD: ${UNLEASH_DB_PASSWORD}
      POSTGRES_DB: unleash_db
    volumes:
      - unleash_pg_data:/var/lib/postgresql/data
    networks:
      - sf1-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash_user -d unleash_db && psql -U unleash_user -d unleash_db -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  unleash:
    image: unleashorg/unleash-server:6
    container_name: sf1-unleash
    restart: always
    environment:
      DATABASE_URL: postgresql://unleash_user:${UNLEASH_DB_PASSWORD}@unleash-db:5432/unleash_db
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: "*:*.${UNLEASH_ADMIN_API_KEY}"
      INIT_CLIENT_API_TOKENS: "default:development.${UNLEASH_CLIENT_API_KEY}"
      INIT_FRONTEND_API_TOKENS: "default:development.${UNLEASH_FRONTEND_API_KEY}"
      LOG_LEVEL: warn
      UNLEASH_URL: https://flags.seedfinderpro.de
    depends_on:
      unleash-db:
        condition: service_healthy
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.unleash.rule=Host(`flags.seedfinderpro.de`)"
      - "traefik.http.routers.unleash.entrypoints=websecure"
      - "traefik.http.routers.unleash.tls=true"
      - "traefik.http.routers.unleash.tls.certresolver=letsencrypt"
      - "traefik.http.services.unleash.loadbalancer.server.port=4242"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4242/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Host-Metriken (CPU, RAM, Disk, Netzwerk)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: sf1-node-exporter
    restart: always
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - sf1-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
