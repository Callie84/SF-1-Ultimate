global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sf1-ultimate'
    environment: 'production'

# Alertmanager-Verbindung
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Alert-Regeln laden
rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:

  # ==========================================
  # INFRASTRUKTUR
  # ==========================================

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Host-Metriken (CPU, RAM, Disk, Netzwerk)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ==========================================
  # MICROSERVICES
  # prom-client implementiert 2026-03-02
  # ==========================================

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: '/metrics'

  - job_name: 'price-service'
    static_configs:
      - targets: ['price-service:3002']
    metrics_path: '/metrics'

  - job_name: 'journal-service'
    static_configs:
      - targets: ['journal-service:3003']
    metrics_path: '/metrics'

  - job_name: 'tools-service'
    static_configs:
      - targets: ['tools-service:3004']
    metrics_path: '/metrics'

  - job_name: 'community-service'
    static_configs:
      - targets: ['community-service:3005']
    metrics_path: '/metrics'

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3006']
    metrics_path: '/metrics'

  - job_name: 'search-service'
    static_configs:
      - targets: ['search-service:3007']
    metrics_path: '/metrics'

  - job_name: 'media-service'
    static_configs:
      - targets: ['media-service:3008']
    metrics_path: '/metrics'

  - job_name: 'gamification-service'
    static_configs:
      - targets: ['gamification-service:3009']
    metrics_path: '/metrics'

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:3010']
    metrics_path: '/metrics'
