server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs via journal
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            values: ["com.docker.compose.project=sf-1-ultimate-"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{service="frontend"}'
          stages:
            - regex:
                expression: '(?P<level>error|warn|info|debug)'
            - labels:
                level:
      - match:
          selector: '{service=~"auth-service|community-service|price-service|journal-service|ai-service|tools-service|search-service|notification-service|media-service|gamification-service"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
            - labels:
                level:
