version: '3.8'

# ============================================================
# SF-1 Ultimate – Staging Stack
# Domain: staging.seedfinderpro.de
# Start:  scripts/staging-up.sh
# Stop:   docker-compose -f docker-compose.staging.yml --env-file .env.staging down
#
# Design:
#   - Teilt sf1-network mit Production (Zugriff auf DB-Container)
#   - Eigene Datenbank-Namespaces: sf1_stg_*
#   - Alle Routes hinter BasicAuth-Schutz
#   - Nur bei Bedarf starten (spart RAM)
# ============================================================

networks:
  sf1-network:
    external: true
    name: sf-1-ultimate-_sf1-network

services:

  # ----------------------------------------------------------
  # FRONTEND
  # ----------------------------------------------------------
  frontend-stg:
    image: node:20-alpine
    container_name: sf1-frontend-stg
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install --include=dev && npm run build && npm run start"
    volumes:
      - ./apps/web-app:/app
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ""
      NEXT_TELEMETRY_DISABLED: 1
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-stg.rule=Host(`staging.seedfinderpro.de`)"
      - "traefik.http.routers.frontend-stg.priority=1"
      - "traefik.http.routers.frontend-stg.entrypoints=websecure"
      - "traefik.http.routers.frontend-stg.tls=true"
      - "traefik.http.routers.frontend-stg.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend-stg.middlewares=staging-auth"
      - "traefik.http.services.frontend-stg.loadbalancer.server.port=3000"
      # BasicAuth-Middleware (für ALLE Staging-Routes)
      - "traefik.http.middlewares.staging-auth.basicauth.users=${STAGING_BASICAUTH_USERS}"
      - "traefik.http.middlewares.staging-auth.basicauth.removeheader=true"

  # ----------------------------------------------------------
  # BACKEND SERVICES
  # ----------------------------------------------------------

  auth-service-stg:
    image: node:20-slim
    container_name: sf1-auth-service-stg
    restart: unless-stopped
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y openssl ca-certificates && npm install && npx prisma generate && npx prisma db push && npm install -g tsx && npx tsx watch src/index.ts"
    volumes:
      - ./apps/auth-service:/app
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgresql://sf1_user:${POSTGRES_PASSWORD}@postgres:5432/sf1_stg_db
      MONGODB_URL: mongodb://sf1_admin:${MONGO_PASSWORD}@mongodb:27017/sf1_stg_auth?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    networks:
      - sf1-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-stg.rule=Host(`staging.seedfinderpro.de`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.auth-stg.priority=10"
      - "traefik.http.routers.auth-stg.entrypoints=websecure"
      - "traefik.http.routers.auth-stg.tls=true"
      - "traefik.http.routers.auth-stg.tls.certresolver=letsencrypt"
      - "traefik.http.routers.auth-stg.middlewares=staging-auth"
      - "traefik.http.services.auth-stg.loadbalancer.server.port=3001"

